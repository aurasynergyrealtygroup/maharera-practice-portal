<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — MahaRERA Practice Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="brand">
      <svg class="brand-seal" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="#C79A3C" stroke-width="3"/><circle cx="50" cy="50" r="36" fill="none" stroke="#C79A3C" stroke-width="1"/><path d="M35 52 L45 62 L67 38" fill="none" stroke="#E4C77E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="brand-text"><strong>MahaRERA Practice</strong><span>Registered Agent Prep Portal</span></span>
    </a>
    <nav class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="profile.html">Profile</a>
      <a href="contact.html">Contact</a>
      <a href="#" id="logoutBtn" class="nav-cta">Sign out</a>
    </nav>
  </div>
</header>

<div class="app-shell">
  <div class="container app-header-bar">
    <div class="eyebrow">Your dashboard</div>
    <h1 style="font-size:30px;">Welcome, <span id="welcomeName">—</span></h1>
    <div class="form-msg error" id="dashboardError" style="display:none;max-width:520px;"></div>
  </div>

  <div class="container">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="label">Payment</div>
        <div class="value"><span class="status-pill" id="payStatus">—</span></div>
      </div>
      <div class="stat-card">
        <div class="label">Attempts used</div>
        <div class="value"><span id="usedAttempts">0</span> / <span id="allowedAttempts">5</span></div>
      </div>
      <div class="stat-card">
        <div class="label">Remaining</div>
        <div class="value" id="remainingAttempts">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Last score</div>
        <div class="value" id="lastScore">—</div>
      </div>
    </div>

    <div class="panel text-center">
      <button class="btn btn-gold btn-lg" id="startTestBtn">Loading…</button>
      <p class="small" id="startNotice" style="margin-top:14px;">Checking your account…</p>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>Your attempts</h2></div>
      <table class="ledger">
        <thead>
          <tr><th>Exam ID</th><th>Date</th><th>Score</th><th>Result</th><th></th></tr>
        </thead>
        <tbody id="resultsBody">
          <tr><td colspan="5" class="small">Loading your history…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
