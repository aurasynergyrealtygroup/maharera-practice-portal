<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — MahaRERA Practice Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="brand">
      <svg class="brand-seal" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="#C79A3C" stroke-width="3"/><circle cx="50" cy="50" r="36" fill="none" stroke="#C79A3C" stroke-width="1"/><path d="M35 52 L45 62 L67 38" fill="none" stroke="#E4C77E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="brand-text"><strong>MahaRERA Practice</strong><span>Registered Agent Prep Portal</span></span>
    </a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="pricing.html">Pricing</a>
      <a href="contact.html">Contact</a>
      <a href="login.html" class="nav-cta">Sign in</a>
    </nav>
  </div>
</header>

<div class="auth-shell">
  <div class="auth-card">
    <svg class="stamp" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="#C79A3C" stroke-width="3"/><path d="M35 52 L45 62 L67 38" fill="none" stroke="#C79A3C" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <h1>Create your account</h1>
    <p class="sub">Register free — payment is only needed when you're ready to start your first mock test.</p>

    <div class="form-msg" id="formMsg"></div>

    <form id="registerForm">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" required placeholder="As per your MahaRERA application">
      </div>
      <div class="field">
        <label for="mobile">Mobile number</label>
        <input type="tel" id="mobile" required maxlength="10" placeholder="10-digit mobile number">
      </div>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" placeholder="At least 6 characters">
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" required minlength="6" placeholder="Re-enter your password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Create account</button>
    </form>

    <div class="auth-switch">Already registered? <a href="login.html">Sign in</a></div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
