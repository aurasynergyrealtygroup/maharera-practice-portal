<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice test — MahaRERA Practice Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="exam-bar">
  <div class="container">
    <div class="brand" style="color:#fff;">
      <svg class="brand-seal" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="#C79A3C" stroke-width="3"/><path d="M35 52 L45 62 L67 38" fill="none" stroke="#E4C77E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="brand-text"><strong>Practice Test</strong><span>In progress — do not close this tab</span></span>
    </div>
    <div style="text-align:right;">
      <div class="timer"><span>⏱</span><span id="timerText">60:00</span></div>
      <div class="exam-progress" id="progressLabel">0 / 50 answered</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%;"></div></div>
    </div>
  </div>
</div>

<div id="examLoading" class="container" style="padding:100px 24px;text-align:center;">
  <p>Loading your 50 questions…</p>
</div>

<div id="examLayout" class="exam-layout" style="display:none;">
  <div class="question-card">
    <div class="q-meta" id="qMeta">Question 1 of 50 · 2 marks</div>
    <div class="q-text" id="qText">—</div>
    <div class="options" id="optionsWrap"></div>
    <div class="exam-nav-actions">
      <button class="btn btn-outline" id="prevBtn">← Previous</button>
      <button class="btn btn-primary" id="nextBtn">Next question →</button>
    </div>
  </div>
  <div class="sidebar-panel">
    <h4>Question map</h4>
    <div class="qgrid" id="qGrid"></div>
    <p class="small" style="margin-top:16px;">Dark = answered. Click any number to jump there.</p>
    <button class="btn btn-gold btn-full" style="margin-top:8px;" onclick="confirmSubmit()">Submit test</button>
  </div>
</div>

<div id="submitOverlay" style="display:none;position:fixed;inset:0;background:rgba(15,42,61,.85);z-index:100;align-items:center;justify-content:center;color:#fff;flex-direction:column;gap:12px;">
  <span class="loading-spin" style="width:26px;height:26px;"></span>
  <p style="color:#fff;">Scoring your test…</p>
</div>

<script src="js/app.js"></script>
<script src="js/exam.js"></script>
</body>
</html>
