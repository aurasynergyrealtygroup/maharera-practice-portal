<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Payments</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="admin-shell">
  <aside class="admin-side">
    <div class="brand">
      <svg class="brand-seal" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="#C79A3C" stroke-width="3"/><path d="M35 52 L45 62 L67 38" fill="none" stroke="#E4C77E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="brand-text"><strong style="color:#fff;">Admin</strong><span>Practice Portal</span></span>
    </div>
    <a href="dashboard.html" data-nav="dashboard.html">Overview</a>
    <a href="users.html" data-nav="users.html">Users</a>
    <a href="questions.html" data-nav="questions.html">Questions</a>
    <a href="payments.html" data-nav="payments.html">Payments</a>
    <a href="results.html" data-nav="results.html">Results</a>
    <a href="#" id="adminLogoutBtn" style="margin-top:24px;border-top:1px solid var(--navy-2);padding-top:20px;">Sign out</a>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div><div class="eyebrow">Signed in as <span id="adminName">—</span></div><h1 style="font-size:26px;">Payments</h1></div>
      <button class="btn btn-outline" onclick="exportCsv()">Export CSV</button>
    </div>

    <div class="form-msg error" id="pageError" style="display:none;"></div>

    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);">
      <div class="stat-card"><div class="label">Total collected</div><div class="value" id="statTotal">—</div></div>
      <div class="stat-card"><div class="label">Successful payments</div><div class="value" id="statCount">—</div></div>
      <div class="stat-card"><div class="label">This month</div><div class="value" id="statMonth">—</div></div>
    </div>

    <div class="panel">
      <div class="table-toolbar">
        <input type="text" id="searchInput" placeholder="Search by name or payment ID…">
        <span class="small" id="countLabel"></span>
      </div>
      <table class="ledger">
        <thead><tr><th>Payment ID</th><th>User</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
        <tbody id="payBody"><tr><td colspan="5" class="small">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<script src="../js/app.js"></script>
<script src="../js/admin.js"></script>
<script>
let ALL_PAY = [];

document.addEventListener("DOMContentLoaded", async () => {
  requireAdminAuth();
  try {
    const data = await adminApi("adminListPayments");
    ALL_PAY = data.payments;
    document.getElementById("statTotal").textContent = "₹" + data.totalCollected;
    document.getElementById("statCount").textContent = data.successCount;
    document.getElementById("statMonth").textContent = "₹" + data.thisMonth;
    renderPayments(ALL_PAY);
  } catch (err) {
    document.getElementById("pageError").textContent = err.message;
    document.getElementById("pageError").style.display = "block";
  }
});

function renderPayments(list) {
  document.getElementById("countLabel").textContent = list.length + " record(s)";
  const tbody = document.getElementById("payBody");
  tbody.innerHTML = "";
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="small">No payments yet.</td></tr>';
    return;
  }
  list.forEach(p => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td style="font-family:var(--mono)">${p.paymentId}</td>
      <td>${p.name}</td>
      <td>₹${p.amount}</td>
      <td><span class="tag ${p.status === 'Paid' ? 'green' : 'red'}">${p.status}</span></td>
      <td>${formatDate(p.date)}</td>`;
    tbody.appendChild(tr);
  });
}

document.getElementById("searchInput").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();
  renderPayments(ALL_PAY.filter(p => p.name.toLowerCase().includes(q) || p.paymentId.toLowerCase().includes(q)));
});

function exportCsv() {
  const rows = [["Payment ID","User","Amount","Status","Date"]];
  ALL_PAY.forEach(p => rows.push([p.paymentId, p.name, p.amount, p.status, p.date]));
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "payments.csv";
  a.click();
}
</script>
</body>
</html>
