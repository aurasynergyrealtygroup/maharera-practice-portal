<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Questions</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="admin-shell">
  <aside class="admin-side">
    <div class="brand">
      <svg class="brand-seal" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="#C79A3C" stroke-width="3"/><path d="M35 52 L45 62 L67 38" fill="none" stroke="#E4C77E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="brand-text"><strong style="color:#fff;">Admin</strong><span>Practice Portal</span></span>
    </div>
    <a href="dashboard.html" data-nav="dashboard.html">Overview</a>
    <a href="users.html" data-nav="users.html">Users</a>
    <a href="questions.html" data-nav="questions.html">Questions</a>
    <a href="payments.html" data-nav="payments.html">Payments</a>
    <a href="results.html" data-nav="results.html">Results</a>
    <a href="#" id="adminLogoutBtn" style="margin-top:24px;border-top:1px solid var(--navy-2);padding-top:20px;">Sign out</a>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div><div class="eyebrow">Signed in as <span id="adminName">—</span></div><h1 style="font-size:26px;">Question bank</h1></div>
      <button class="btn btn-primary" onclick="openForm()">+ Add question</button>
    </div>

    <div class="form-msg error" id="pageError" style="display:none;"></div>

    <div class="panel" id="formPanel" style="display:none;">
      <div class="panel-head"><h2 id="formTitle">Add question</h2></div>
      <input type="hidden" id="qid">
      <div class="field"><label>Question text</label><input type="text" id="qText"></div>
      <div class="grid-2">
        <div class="field"><label>Option A</label><input type="text" id="optA"></div>
        <div class="field"><label>Option B</label><input type="text" id="optB"></div>
        <div class="field"><label>Option C</label><input type="text" id="optC"></div>
        <div class="field"><label>Option D</label><input type="text" id="optD"></div>
      </div>
      <div class="field" style="max-width:200px;">
        <label>Correct answer</label>
        <select id="correctAnswer"><option>A</option><option>B</option><option>C</option><option>D</option></select>
      </div>
      <div class="form-msg" id="formMsg"></div>
      <button class="btn btn-primary" id="saveBtn" onclick="saveQuestion()">Save question</button>
      <button class="btn btn-outline" onclick="closeForm()">Cancel</button>
    </div>

    <div class="panel">
      <div class="table-toolbar">
        <input type="text" id="searchInput" placeholder="Search questions…">
        <span class="small" id="countLabel"></span>
      </div>
      <table class="ledger">
        <thead><tr><th>QID</th><th>Question</th><th>Answer</th><th>Actions</th></tr></thead>
        <tbody id="qBody"><tr><td colspan="4" class="small">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<script src="../js/app.js"></script>
<script src="../js/admin.js"></script>
<script>
let ALL_Q = [];

document.addEventListener("DOMContentLoaded", async () => {
  requireAdminAuth();
  await loadQuestions();
});

async function loadQuestions() {
  try {
    ALL_Q = await adminApi("adminListQuestions");
    renderQuestions(ALL_Q);
  } catch (err) {
    document.getElementById("pageError").textContent = err.message;
    document.getElementById("pageError").style.display = "block";
  }
}

function renderQuestions(list) {
  document.getElementById("countLabel").textContent = list.length + " question(s)";
  const tbody = document.getElementById("qBody");
  tbody.innerHTML = "";
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="small">No questions yet. Add one, or bulk-upload via the Questions sheet directly.</td></tr>';
    return;
  }
  list.forEach(q => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td style="font-family:var(--mono)">${q.qid}</td>
      <td>${q.question}</td>
      <td><span class="tag gold">${q.answer}</span></td>
      <td>
        <button class="icon-btn" onclick='editQuestion(${JSON.stringify(q).replace(/'/g,"&#39;")})'>Edit</button>
        <button class="icon-btn" onclick="deleteQuestion('${q.qid}')">Delete</button>
      </td>`;
    tbody.appendChild(tr);
  });
}

document.getElementById("searchInput").addEventListener("input", (e) => {
  const query = e.target.value.toLowerCase();
  renderQuestions(ALL_Q.filter(q => q.question.toLowerCase().includes(query)));
});

function openForm() {
  document.getElementById("formTitle").textContent = "Add question";
  document.getElementById("qid").value = "";
  document.getElementById("qText").value = "";
  document.getElementById("optA").value = "";
  document.getElementById("optB").value = "";
  document.getElementById("optC").value = "";
  document.getElementById("optD").value = "";
  document.getElementById("correctAnswer").value = "A";
  hideMsg(document.getElementById("formMsg"));
  document.getElementById("formPanel").style.display = "block";
}
function closeForm() { document.getElementById("formPanel").style.display = "none"; }

function editQuestion(q) {
  document.getElementById("formTitle").textContent = "Edit question " + q.qid;
  document.getElementById("qid").value = q.qid;
  document.getElementById("qText").value = q.question;
  document.getElementById("optA").value = q.optionA;
  document.getElementById("optB").value = q.optionB;
  document.getElementById("optC").value = q.optionC;
  document.getElementById("optD").value = q.optionD;
  document.getElementById("correctAnswer").value = q.answer;
  hideMsg(document.getElementById("formMsg"));
  document.getElementById("formPanel").style.display = "block";
}

async function saveQuestion() {
  const msg = document.getElementById("formMsg");
  hideMsg(msg);
  const payload = {
    qid: document.getElementById("qid").value,
    question: document.getElementById("qText").value.trim(),
    optionA: document.getElementById("optA").value.trim(),
    optionB: document.getElementById("optB").value.trim(),
    optionC: document.getElementById("optC").value.trim(),
    optionD: document.getElementById("optD").value.trim(),
    answer: document.getElementById("correctAnswer").value
  };
  if (!payload.question || !payload.optionA || !payload.optionB || !payload.optionC || !payload.optionD) {
    return showMsg(msg, "All fields are required.");
  }
  try {
    await adminApi(payload.qid ? "adminUpdateQuestion" : "adminAddQuestion", payload);
    closeForm();
    await loadQuestions();
  } catch (err) {
    showMsg(msg, err.message);
  }
}

async function deleteQuestion(qid) {
  if (!confirm("Delete question " + qid + "? This cannot be undone.")) return;
  try { await adminApi("adminDeleteQuestion", { qid }); await loadQuestions(); }
  catch (err) { alert(err.message); }
}
</script>
</body>
</html>
