<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Users</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="admin-shell">
  <aside class="admin-side">
    <div class="brand">
      <svg class="brand-seal" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="#C79A3C" stroke-width="3"/><path d="M35 52 L45 62 L67 38" fill="none" stroke="#E4C77E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="brand-text"><strong style="color:#fff;">Admin</strong><span>Practice Portal</span></span>
    </div>
    <a href="dashboard.html" data-nav="dashboard.html">Overview</a>
    <a href="users.html" data-nav="users.html">Users</a>
    <a href="questions.html" data-nav="questions.html">Questions</a>
    <a href="payments.html" data-nav="payments.html">Payments</a>
    <a href="results.html" data-nav="results.html">Results</a>
    <a href="#" id="adminLogoutBtn" style="margin-top:24px;border-top:1px solid var(--navy-2);padding-top:20px;">Sign out</a>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div><div class="eyebrow">Signed in as <span id="adminName">—</span></div><h1 style="font-size:26px;">Users</h1></div>
    </div>

    <div class="form-msg error" id="pageError" style="display:none;"></div>

    <div class="panel">
      <div class="table-toolbar">
        <input type="text" id="searchInput" placeholder="Search by name, mobile or email…">
        <span class="small" id="countLabel"></span>
      </div>
      <table class="ledger">
        <thead><tr><th>Name</th><th>Mobile</th><th>Email</th><th>Payment</th><th>Attempts</th><th>Actions</th></tr></thead>
        <tbody id="usersBody"><tr><td colspan="6" class="small">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<script src="../js/app.js"></script>
<script src="../js/admin.js"></script>
<script>
let ALL_USERS = [];

document.addEventListener("DOMContentLoaded", async () => {
  requireAdminAuth();
  await loadUsers();
});

async function loadUsers() {
  try {
    ALL_USERS = await adminApi("adminListUsers");
    renderUsers(ALL_USERS);
  } catch (err) {
    document.getElementById("pageError").textContent = err.message;
    document.getElementById("pageError").style.display = "block";
  }
}

function renderUsers(list) {
  document.getElementById("countLabel").textContent = list.length + " user(s)";
  const tbody = document.getElementById("usersBody");
  tbody.innerHTML = "";
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="small">No users found.</td></tr>';
    return;
  }
  list.forEach(u => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${u.name}</td>
      <td style="font-family:var(--mono)">${u.mobile}</td>
      <td>${u.email}</td>
      <td><span class="tag ${u.paid ? 'green' : 'red'}">${u.paid ? 'Paid' : 'Unpaid'}</span></td>
      <td>${u.usedAttempts} / ${u.allowedAttempts}</td>
      <td>
        <button class="icon-btn" onclick="resetAttempts('${u.userId}')">Reset attempts</button>
        <button class="icon-btn" onclick="grantAttempt('${u.userId}')">+1 attempt</button>
        <button class="icon-btn" onclick="toggleBlock('${u.userId}', ${!u.blocked})">${u.blocked ? 'Unblock' : 'Block'}</button>
      </td>`;
    tbody.appendChild(tr);
  });
}

document.getElementById("searchInput").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();
  renderUsers(ALL_USERS.filter(u =>
    u.name.toLowerCase().includes(q) || u.mobile.includes(q) || u.email.toLowerCase().includes(q)
  ));
});

async function resetAttempts(userId) {
  if (!confirm("Reset used attempts to 0 for this user?")) return;
  try { await adminApi("adminResetAttempts", { userId }); await loadUsers(); }
  catch (err) { alert(err.message); }
}
async function grantAttempt(userId) {
  try { await adminApi("adminGrantAttempt", { userId }); await loadUsers(); }
  catch (err) { alert(err.message); }
}
async function toggleBlock(userId, block) {
  if (!confirm((block ? "Block" : "Unblock") + " this user?")) return;
  try { await adminApi("adminSetBlocked", { userId, blocked: block }); await loadUsers(); }
  catch (err) { alert(err.message); }
}
</script>
</body>
</html>
