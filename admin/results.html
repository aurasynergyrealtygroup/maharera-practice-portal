<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Results</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="admin-shell">
  <aside class="admin-side">
    <div class="brand">
      <svg class="brand-seal" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="#C79A3C" stroke-width="3"/><path d="M35 52 L45 62 L67 38" fill="none" stroke="#E4C77E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="brand-text"><strong style="color:#fff;">Admin</strong><span>Practice Portal</span></span>
    </div>
    <a href="dashboard.html" data-nav="dashboard.html">Overview</a>
    <a href="users.html" data-nav="users.html">Users</a>
    <a href="questions.html" data-nav="questions.html">Questions</a>
    <a href="payments.html" data-nav="payments.html">Payments</a>
    <a href="results.html" data-nav="results.html">Results</a>
    <a href="#" id="adminLogoutBtn" style="margin-top:24px;border-top:1px solid var(--navy-2);padding-top:20px;">Sign out</a>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div><div class="eyebrow">Signed in as <span id="adminName">—</span></div><h1 style="font-size:26px;">Results &amp; analytics</h1></div>
      <button class="btn btn-outline" onclick="exportCsv()">Export CSV</button>
    </div>

    <div class="form-msg error" id="pageError" style="display:none;"></div>

    <div class="stat-grid">
      <div class="stat-card"><div class="label">Total attempts</div><div class="value" id="statAttempts">—</div></div>
      <div class="stat-card"><div class="label">Passed</div><div class="value" id="statPassed">—</div></div>
      <div class="stat-card"><div class="label">Failed</div><div class="value" id="statFailed">—</div></div>
      <div class="stat-card"><div class="label">Average score</div><div class="value" id="statAvg">—</div></div>
    </div>

    <div class="panel">
      <div class="table-toolbar">
        <input type="text" id="searchInput" placeholder="Search by user or exam ID…">
        <span class="small" id="countLabel"></span>
      </div>
      <table class="ledger">
        <thead><tr><th>Exam ID</th><th>User</th><th>Date</th><th>Score</th><th>Result</th></tr></thead>
        <tbody id="resBody"><tr><td colspan="5" class="small">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<script src="../js/app.js"></script>
<script src="../js/admin.js"></script>
<script>
let ALL_RES = [];

document.addEventListener("DOMContentLoaded", async () => {
  requireAdminAuth();
  try {
    const data = await adminApi("adminListResults");
    ALL_RES = data.results;
    document.getElementById("statAttempts").textContent = data.total;
    document.getElementById("statPassed").textContent = data.passed;
    document.getElementById("statFailed").textContent = data.failed;
    document.getElementById("statAvg").textContent = data.avgScore;
    renderResults(ALL_RES);
  } catch (err) {
    document.getElementById("pageError").textContent = err.message;
    document.getElementById("pageError").style.display = "block";
  }
});

function renderResults(list) {
  document.getElementById("countLabel").textContent = list.length + " record(s)";
  const tbody = document.getElementById("resBody");
  tbody.innerHTML = "";
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="small">No results yet.</td></tr>';
    return;
  }
  list.forEach(r => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td style="font-family:var(--mono)">${r.examId}</td>
      <td>${r.name}</td>
      <td>${formatDate(r.date)}</td>
      <td>${r.score}/100</td>
      <td><span class="tag ${r.result === 'PASS' ? 'green' : 'red'}">${r.result}</span></td>`;
    tbody.appendChild(tr);
  });
}

document.getElementById("searchInput").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();
  renderResults(ALL_RES.filter(r => r.name.toLowerCase().includes(q) || r.examId.toLowerCase().includes(q)));
});

function exportCsv() {
  const rows = [["Exam ID","User","Date","Score","Result"]];
  ALL_RES.forEach(r => rows.push([r.examId, r.name, r.date, r.score, r.result]));
  const csv = rows.map(row => row.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "results.csv";
  a.click();
}
</script>
</body>
</html>
