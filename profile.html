<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — MahaRERA Practice Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="brand">
      <svg class="brand-seal" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="#C79A3C" stroke-width="3"/><circle cx="50" cy="50" r="36" fill="none" stroke="#C79A3C" stroke-width="1"/><path d="M35 52 L45 62 L67 38" fill="none" stroke="#E4C77E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="brand-text"><strong>MahaRERA Practice</strong><span>Registered Agent Prep Portal</span></span>
    </a>
    <nav class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="profile.html">Profile</a>
      <a href="#" id="logoutBtn" class="nav-cta">Sign out</a>
    </nav>
  </div>
</header>

<div class="app-shell">
  <div class="container" style="padding-top:40px;max-width:560px;">
    <div class="eyebrow">Your profile</div>
    <h1 style="font-size:28px;">Account details</h1>

    <div class="panel">
      <div class="form-msg" id="formMsg"></div>
      <div class="field"><label>Full name</label><input type="text" id="pName" disabled></div>
      <div class="field"><label>Mobile number</label><input type="text" id="pMobile" disabled></div>
      <div class="field"><label>Email address</label><input type="text" id="pEmail" disabled></div>
      <p class="small">To update these details, contact support.</p>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>Change password</h2></div>
      <form id="pwForm">
        <div class="field"><label for="currentPw">Current password</label><input type="password" id="currentPw" required></div>
        <div class="field"><label for="newPw">New password</label><input type="password" id="newPw" required minlength="6"></div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Update password</button>
      </form>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  requireAuth();
  document.getElementById("logoutBtn").addEventListener("click", () => { clearSession(); window.location.href = "login.html"; });
  const user = getUser();
  document.getElementById("pName").value = user.name;
  document.getElementById("pMobile").value = user.mobile;
  document.getElementById("pEmail").value = user.email;
});

document.getElementById("pwForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const msg = document.getElementById("formMsg");
  const btn = document.getElementById("submitBtn");
  hideMsg(msg);
  setBtnLoading(btn, true);
  try {
    await api("changePassword", {
      currentPassword: document.getElementById("currentPw").value,
      newPassword: document.getElementById("newPw").value
    });
    showMsg(msg, "Password updated.", "success");
    e.target.reset();
  } catch (err) {
    showMsg(msg, err.message);
  } finally {
    setBtnLoading(btn, false, "Update password");
  }
});
</script>
</body>
</html>
